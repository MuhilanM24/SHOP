    /* --- PRINT RULES --- */
    @media print {
      #loginSection,
      #authBox,
      form,
      #printBtn,
      #muhil,
      #qwe,
      .muhil,

      h2 { page-break-after: avoid; }
    }

    /* --- ANIMATIONS --- */

    /* Login card entrance */
    #loginSection {
      animation: fadeSlideIn 0.8s ease-out;
    }
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Google login button hover & pulse */
    #googleLoginBtn {
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      border: none;
      background:#4285f4;
      color:#fff;
    }

    #googleLoginBtn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    /* Ripple click effect on login */
    #googleLoginBtn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 10%, transparent 40%);
      opacity: 0;
      transform: scale(0);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    #googleLoginBtn:active::after {
      opacity: 1;
      transform: scale(2);
    }

    /* Subtle hover for all main action buttons */
    button,
    input[type="submit"] {
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    button:hover,
    input[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    /* Slight scale on Print / Clear buttons */
    #printBtn,
    #qwe {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #printBtn:hover,
    #qwe:hover {
      transform: scale(1.04);

    }
    @keyframes fadeInApp {
      from { opacity: 0; transform: translateY(8px); }

  uploadBtn.addEventListener("click", () => {
    const user = auth.currentUser;
    if (!user) {
      alert("Please login again.");
      return;
    }

    const file = fileInput.files[0];
    if (!file) {
      alert("Choose a file first.");
      return;
    }

    const storageRef = storage.ref(`uploads/${user.uid}/${file.name}`);
    const task = storageRef.put(file);

    task.on(
      "state_changed",
      snapshot => {
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        uploadStatus.textContent = `Upload: ${progress.toFixed(0)}%`;
      },
      error => {
        uploadStatus.textContent = "Error: " + error.message;
      },
      () => {
        task.snapshot.ref.getDownloadURL().then(url => {
          uploadStatus.textContent = "Done. URL: " + url;
          console.log("File available at", url);
        });
      }
    );

        <td>Total OB BOT: ${money(totalOB)}</td>
        <td>Total CB BOT: ${money(totalCB)}</td>
        <td>Total Sales BOT: ${money(totalSales)}</td>
        <td>Total Sales Value: ${money(totalSV)}</td>
        <td>Total CB Value: ${money(totalCBV)}</td>
      </tr>
    `;
    host.appendChild(totalTable);
  }

  const editAllBtn = document.getElementById("editAllBtn");
  const saveAllBtn = document.getElementById("saveAllBtn");
  let currentEditGroupIndex = null;

  if (editAllBtn) {
    editAllBtn.addEventListener("click", function () {
      const tableNoStr = prompt("Enter Table Number (1-8) to Edit All OB & CB:");
      if (tableNoStr === null) return;

      const tableNo = parseInt(tableNoStr, 10);
      if (!Number.isInteger(tableNo) || tableNo < 1 || tableNo > 8) {
        alert("Please enter a number from 1 to 8.");
        return;
      }

      const host = document.getElementById("groups");
      const allTables = host.querySelectorAll("table");
      const mainTableIndex = (tableNo - 1) * 2;
      const table = allTables[mainTableIndex];

      if (!table) {
        alert("Table not found.");
        return;
      }

      currentEditGroupIndex = tableNo - 1;

      for (let i = 1; i < table.rows.length; i++) {
        const row = table.rows[i];
        const obCell = row.cells[3];
        const cbCell = row.cells[4];
        if (!obCell || !cbCell) continue;

        obCell.contentEditable = "true";
        cbCell.contentEditable = "true";
        obCell.classList.add("editing");
        cbCell.classList.add("editing");
      }

      editAllBtn.style.display = "none";
      saveAllBtn.style.display = "inline-block";
    });
  }

  if (saveAllBtn) {
    saveAllBtn.addEventListener("click", function () {
      if (currentEditGroupIndex === null) return;

      const host = document.getElementById("groups");
      const allTables = host.querySelectorAll("table");
      const mainTableIndex = currentEditGroupIndex * 2;
      const table = allTables[mainTableIndex];
      if (!table) return;

      const g = GROUPS[currentEditGroupIndex];

      const groupRows = records
        .map((rec, idx) => ({ rec, idx }))
        .filter(x => g.filter(x.rec))
        .sort((a, b) => Number(a.rec[5]) - Number(b.rec[5]));

      for (let i = 1; i < table.rows.length && i <= groupRows.length; i++) {
        const rowEl = table.rows[i];
        const obCell = rowEl.cells[3];
        const cbCell = rowEl.cells[4];
        if (!obCell || !cbCell) continue;

        obCell.contentEditable = "false";
        cbCell.contentEditable = "false";
        obCell.classList.remove("editing");
        cbCell.classList.remove("editing");

        const newOB = parseFloat(obCell.textContent || 0);
        const newCB = parseFloat(cbCell.textContent || 0);

        const recIndex = groupRows[i - 1].idx;
        const rec = records[recIndex];

        rec[2] = newOB;
        rec[3] = newCB;
        rec[4] = newOB - newCB;
        rec[6] = rec[5] * rec[4];
        rec[7] = rec[5] * rec[3];
      }

      saveData();
      renderGroupedTables();

      currentEditGroupIndex = null;
      saveAllBtn.style.display = "none";
      editAllBtn.style.display = "inline-block";
    });
  }

  if (form) {
    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      const ob = parseFloat(document.getElementById("ob").value || 0);
      const cb = parseFloat(document.getElementById("cb").value || 0);
      const price = parseFloat(priceInput.value || 0);

      if (!brand || !ml || !price) {
        alert("Please select Brand + ML. Price will auto-fill. If price is empty, add that brand+ml in PRICELIST.");
        return;
      }

      const sales = ob - cb;
      const sv = price * sales;
      const cbv = price * cb;

      const newRecord = [brand, ml, ob, cb, sales, price, sv, cbv];
      const groupIndex = GROUPS.findIndex(g => g.filter(newRecord));
      if (groupIndex === -1) {
        alert("This record doesn't match any table rules.");
        return;
      }

      const editIndexStr = localStorage.getItem("editIndex");
      const isEditing = editIndexStr !== null;
      const editIndex = isEditing ? parseInt(editIndexStr, 10) : -1;

      if (isEditing) {
        records[editIndex] = newRecord;
        localStorage.removeItem("editIndex");
        alert("Row updated successfully.");
      } else {
        const duplicateInSameTable = records.some(r =>
          GROUPS[groupIndex].filter(r) && r[0].toLowerCase() === brand.toLowerCase()
        );

        if (duplicateInSameTable) {
          alert(`"${brand}" already exists in Table ${groupIndex + 1}. Not added.`);
          return;
        }

        records.push(newRecord);
      }

      saveData();
      renderGroupedTables();

      form.reset();
      brandInput.setAttribute("list", "suggestions");
      datalist.innerHTML = "";
    });
  }

  const eraseBtn = document.getElementById("eraseBtn");
  const eraseForm = document.getElementById("eraseForm");
  const eraseSubmit = document.getElementById("eraseSubmit");

  if (eraseBtn) {
    eraseBtn.addEventListener("click", () => {
      eraseForm.style.display = eraseForm.style.display === "none" ? "block" : "none";
    });
  }

  if (eraseSubmit) {
    eraseSubmit.addEventListener("click", () => {
      const tno = parseInt(document.getElementById("eraseTableNo").value, 10);
      const rno = parseInt(document.getElementById("eraseRowNo").value, 10);

      if (!Number.isInteger(tno) || tno < 1 || tno > 8) {
        alert("Enter table number 1 to 8");
        return;
      }
      if (!Number.isInteger(rno) || rno < 1) {
        alert("Enter row number N (1,2,3...)");
        return;
      }

      const g = GROUPS[tno - 1];

      const tableRows = records
        .map((rec, idx) => ({ rec, idx }))
        .filter(x => g.filter(x.rec))
        .sort((a, b) => Number(a.rec[5]) - Number(b.rec[5]));

      if (tableRows.length === 0) {
        alert("No records in this table");
        return;
      }
      if (rno > tableRows.length) {
        alert(`This table has only ${tableRows.length} rows`);
        return;
      }

      const removeIndex = tableRows[rno - 1].idx;
      records.splice(removeIndex, 1);
      saveData();
      renderGroupedTables();

      document.getElementById("eraseTableNo").value = "";
      document.getElementById("eraseRowNo").value = "";
    });
  }

  const singleEditBtn = document.getElementById("muhil");
  if (singleEditBtn) {
    singleEditBtn.addEventListener("click", function () {
      const tableNoStr = prompt("Enter Table Number to edit:");
      if (tableNoStr === null) return;

      const rowNoStr = prompt("Enter Row Number to edit:");
      if (rowNoStr === null) return;

      const tableNo = parseInt(tableNoStr, 10);
      const rowNo = parseInt(rowNoStr, 10);

      if (!Number.isInteger(tableNo) || !Number.isInteger(rowNo) || tableNo < 1 || tableNo > 8 || rowNo < 1) {
        alert("Invalid table or row number.");
        return;
      }

      const groupIndex = tableNo - 1;
      const g = GROUPS[groupIndex];

      const groupRecords = records
        .map((r, idx) => ({ r, idx }))
        .filter(obj => g.filter(obj.r))
        .sort((a, b) => Number(a.r[5]) - Number(b.r[5]));

      if (groupRecords.length === 0) {
        alert("No records in this table.");
        return;
      }
      if (rowNo > groupRecords.length) {
        alert(`This table has only ${groupRecords.length} rows.`);
        return;
      }

      const target = groupRecords[rowNo - 1];
      const globalIndex = target.idx;
      const row = target.r;

      brandInput.value = row[0];
      mlSelect.value = row[1];
      document.getElementById("ob").value = row[2];
      document.getElementById("cb").value = row[3];
      priceInput.value = row[5];

      localStorage.setItem("editIndex", globalIndex);

      alert("Row loaded. Edit values and press Submit to save.");
    });
  }

  function clearAll() {
    const ok = confirm("Do you want to clear all records?");
    if (!ok) return;

    const text = prompt('Type "yes" to clear all records:');
    if (text === null) return;

    if (text.toLowerCase() !== "yes") {
      alert("Clear cancelled.");
      return;
    }

    records = [];
    localStorage.removeItem(STORAGEKEY);
    renderGroupedTables();
  }
  window.clearAll = clearAll;

  loadData();
  renderBrandOptions("");
  renderGroupedTables();
  </script>
</body>
</html>
