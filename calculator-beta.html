    const BRANDS = [...new Set(PRICELIST.map(x => x.brand))].sort();

    const STORAGEKEY = "calcrecords";
    let records = [];

    function loadData() {
      const saved = localStorage.getItem(STORAGEKEY);
      if (saved) records = JSON.parse(saved);
    }
    function saveData() {
      localStorage.setItem(STORAGEKEY, JSON.stringify(records));
    }

    const form = document.getElementById("information");
    const brandInput = document.getElementById("brand");
    const mlSelect = document.getElementById("ml");
    const priceInput = document.getElementById("price");
    const datalist = document.getElementById("suggestions");

    brandInput.setAttribute("list", "suggestions");

    function renderBrandOptions(filterText) {
      datalist.innerHTML = "";
      const q = (filterText || "").toLowerCase();
      BRANDS
        .filter(b => b.toLowerCase().includes(q))
        .slice(0, 30)
        .forEach(b => {
          const opt = document.createElement("option");
          opt.value = b;
          datalist.appendChild(opt);
        });
    }

    function autoApplyPrice() {
      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      if (!brand || !ml) return;
      const match = PRICELIST.find(x => x.brand === brand && x.ml === ml);
      priceInput.value = match ? match.price : "";
    }

    brandInput.addEventListener("input", () => {
      renderBrandOptions(brandInput.value);
      autoApplyPrice();
    });
    brandInput.addEventListener("focus", () => renderBrandOptions(brandInput.value));
    mlSelect.addEventListener("change", autoApplyPrice);

    function money(n) { return (Number(n) || 0).toFixed(2); }
    function sumField(arr, idx) { return arr.reduce((a, r) => a + (Number(r[idx]) || 0), 0); }

    function compareByPriceThenBrand(a, b) {
      const priceA = Number(a[5]);
      const priceB = Number(b[5]);
      if (priceA !== priceB) return priceA - priceB;
      const brandA = (a[0] || "").toLowerCase();
      const brandB = (b[0] || "").toLowerCase();
      return brandA.localeCompare(brandB);
    }
    function compareObjByPriceThenBrand(x, y) {
      const ra = x.rec || x.r;
      const rb = y.rec || y.r;
      return compareByPriceThenBrand(ra, rb);
    }

          const cells = row.querySelectorAll("td");
          if (cells.length < 9) return;
          const obCell    = cells[3];
          const salesCell = cells[5];
          obCell.contentEditable = "true";
          salesCell.contentEditable = "true";
          obCell.classList.add("editing");
          salesCell.classList.add("editing");
        });
      });

      editAllActive = true;
      editAllBtn.style.display = "none";
      saveAllBtn.style.display = "inline-block";
    });

    function saveAllFromAllTables() {
      const host = document.getElementById("groups");
      const tables = host.querySelectorAll("table");

      GROUPS.forEach((g, groupIndex) => {
        const groupRows = records
          .map((rec, idx) => ({ rec, idx }))
          .filter(x => g.filter(x.rec))
          .sort(compareObjByPriceThenBrand);

        if (groupRows.length === 0) return;

        const mainTableIndex = groupIndex * 2;
        const table = tables[mainTableIndex];
        if (!table) return;

        const bodyRows = table.querySelectorAll("tbody tr");
        let gi = 0;
        bodyRows.forEach(rowEl => {
          const cells = rowEl.querySelectorAll("td");
          if (cells.length < 9) return;

          const obCell    = cells[3];
          const cbCell    = cells[4];
          const salesCell = cells[5];
          const priceCell = cells[6];
          const svCell    = cells[7];
          const cbvCell   = cells[8];

          obCell.contentEditable = "false";
          salesCell.contentEditable = "false";
          obCell.classList.remove("editing");
          salesCell.classList.remove("editing");

          const newOB    = Number(obCell.textContent || 0);
          const newSales = Number(salesCell.textContent || 0);
          const price    = Number(priceCell.textContent || 0);
          const newCB    = newOB - newSales;
          const newSV    = price * newSales;
          const newCBV   = price * newCB;

          cbCell.textContent  = money(newCB);
          svCell.textContent  = money(newSV);
          cbvCell.textContent = money(newCBV);

          const recIndex = groupRows[gi].idx;
          const rec = records[recIndex];
          rec[2] = newOB;
          rec[4] = newSales;
          rec[3] = newCB;
          rec[6] = newSV;
          rec[7] = newCBV;

          gi++;
        });
      });

      saveData();
      renderGroupedTables();

      editAllActive = false;
      saveAllBtn.style.display = "none";
      editAllBtn.style.display = "inline-block";
    }

    function saveSingleGroup(idx) {
      const host = document.getElementById("groups");
      const allTables = host.querySelectorAll("table");
      const mainTableIndex = idx * 2;
      const table = allTables[mainTableIndex];
      if (!table) return;
      const g = GROUPS[idx];

      const groupRows = records
        .map((rec, i) => ({ rec, idx: i }))
        .filter(x => g.filter(x.rec))
        .sort(compareObjByPriceThenBrand);

      for (let i = 1; i < table.rows.length && i <= groupRows.length; i++) {
        const rowEl = table.rows[i];
        const obCell = rowEl.cells[3];
        const cbCell = rowEl.cells[4];
        if (!obCell || !cbCell) continue;

        obCell.contentEditable = "false";
        cbCell.contentEditable = "false";
        obCell.classList.remove("editing");
        cbCell.classList.remove("editing");

        const newOB = parseFloat(obCell.textContent || 0);
        const newCB = parseFloat(cbCell.textContent || 0);
        const recIndex = groupRows[i - 1].idx;
        const rec = records[recIndex];
        rec[2] = newOB;
        rec[3] = newCB;
        rec[4] = newOB - newCB;
        rec[6] = rec[5] * rec[4];
        rec[7] = rec[5] * rec[3];
      }

      saveData();
      renderGroupedTables();
      currentEditGroupIndex = null;
      saveAllBtn.style.display = "none";
      editAllBtn.style.display = "inline-block";
    }

    saveAllBtn.addEventListener("click", function () {
      if (editAllActive) {
        saveAllFromAllTables();
        return;
      }
      if (typeof currentEditGroupIndex === "number") {
        saveSingleGroup(currentEditGroupIndex);
      }
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      const ob = parseFloat(document.getElementById("ob").value || 0);
      const cb = parseFloat(document.getElementById("cb").value || 0);
      const price = parseFloat(priceInput.value || 0);
      if (!brand || !ml || !price) {
        alert("Please select Brand + ML. Price will auto-fill. If price is empty, add that brand+ml in PRICELIST.");
        return;
      }
      const sales = ob - cb;
      const sv = price * sales;
      const cbv = price * cb;

      const newRecord = [brand, ml, ob, cb, sales, price, sv, cbv];
      const groupIndex = GROUPS.findIndex(g => g.filter(newRecord));
      if (groupIndex === -1) {
        alert("This record doesn't match any table rules.");
        return;
      }

      const editIndexStr = localStorage.getItem("editIndex");
      const isEditing = editIndexStr !== null;
      const editIndex = isEditing ? parseInt(editIndexStr, 10) : -1;

      if (isEditing) {
        records[editIndex] = newRecord;
        localStorage.removeItem("editIndex");
        alert("Row updated successfully.");
      } else {
        const duplicateInSameTable = records.some(function (r) {
          const inSameGroup = GROUPS[groupIndex].filter(r);
          const sameBrand = (r[0] || "").toLowerCase() === brand.toLowerCase();
          return inSameGroup && sameBrand;
        });
        if (duplicateInSameTable) {
          alert('"' + brand + '" already exists in Table ' + (groupIndex + 1) + '. Not added.');
          return;
        }
        records.push(newRecord);
      }

      saveData();
      renderGroupedTables();
      form.reset();
      brandInput.setAttribute("list", "suggestions");
      datalist.innerHTML = "";
    });

    const eraseBtn = document.getElementById("eraseBtn");
    const eraseFormDiv = document.getElementById("eraseForm");
    const eraseSubmit = document.getElementById("eraseSubmit");

    eraseBtn.addEventListener("click", () => {
      eraseFormDiv.style.display = eraseFormDiv.style.display === "none" ? "block" : "none";
    });

    eraseSubmit.addEventListener("click", () => {
      const tno = parseInt(document.getElementById("eraseTableNo").value, 10);
      const rno = parseInt(document.getElementById("eraseRowNo").value, 10);
      if (!Number.isInteger(tno) || tno < 1 || tno > 8) {
        alert("Enter table number 1 to 8");
        return;
      }
      if (!Number.isInteger(rno) || rno < 1) {
        alert("Enter row number N (1,2,3...)");
        return;
      }
      const g = GROUPS[tno - 1];
      const tableRows = records
        .map((rec, idx) => ({ rec, idx }))
        .filter(x => g.filter(x.rec))
        .sort(compareObjByPriceThenBrand);
      if (tableRows.length === 0) {
        alert("No records in this table");
        return;
      }
      if (rno > tableRows.length) {
        alert("This table has only " + tableRows.length + " rows");
        return;
      }
      const removeIndex = tableRows[rno - 1].idx;
      records.splice(removeIndex, 1);
      saveData();
      renderGroupedTables();
      document.getElementById("eraseTableNo").value = "";
      document.getElementById("eraseRowNo").value = "";
    });

    document.getElementById("muhil").addEventListener("click", function () {
      const tableNoStr = prompt("Enter Table Number to edit:");
      if (tableNoStr === null) return;
      const rowNoStr = prompt("Enter Row Number to edit:");
      if (rowNoStr === null) return;
      const tableNo = parseInt(tableNoStr, 10);
      const rowNo = parseInt(rowNoStr, 10);
      if (!Number.isInteger(tableNo) || !Number.isInteger(rowNo) || tableNo < 1 || tableNo > 8 || rowNo < 1) {
        alert("Invalid table or row number.");
        return;
      }
      const groupIndex = tableNo - 1;
      const g = GROUPS[groupIndex];
      const groupRecords = records
        .map((r, idx) => ({ r, idx }))
        .filter(function (obj) { return g.filter(obj.r); })
        .sort(function (a, b) { return compareByPriceThenBrand(a.r, b.r); });
      if (groupRecords.length === 0) {
        alert("No records in this table.");
        return;
      }
      if (rowNo > groupRecords.length) {
        alert("This table has only " + groupRecords.length + " rows.");
        return;
      }
      const target = groupRecords[rowNo - 1];
      const globalIndex = target.idx;
      const row = target.r;
      brandInput.value = row[0];
      mlSelect.value = row[1];
      document.getElementById("ob").value = row[2];
      document.getElementById("cb").value = row[3];
      priceInput.value = row[5];
      localStorage.setItem("editIndex", globalIndex);
      alert("Row loaded. Edit values and press Submit to save.");
    });

    function clearAll() {
      const ok = confirm("Do you want to clear all records?");
      if (!ok) return;
      const text = prompt('Type "yes" to clear all records:');
      if (text === null) return;
      if (text.toLowerCase() !== "yes") {
        alert("Clear cancelled.");
        return;
      }
      records = [];
      localStorage.removeItem(STORAGEKEY);
      renderGroupedTables();
    }
    window.clearAll = clearAll;

    const firebaseConfig = {
      apiKey: "AIzaSyCYBSq_NTLy0lqcL1bXd3iGtjr16fZEvBA",
      authDomain: "store-45bb2.firebaseapp.com",
      projectId: "store-45bb2",
      storageBucket: "store-45bb2.firebasestorage.app",
      messagingSenderId: "385087942859",
      appId: "1:385087942859:web:47de5f5375550a26bb6b4e",
      measurementId: "G-V7PY6W7VND"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;

    function updateLoginUI(user) {
      const status = document.getElementById("userStatus");
      const hint = document.getElementById("userHint");
      const avatar = document.getElementById("userAvatar");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const loginBtnMobile = document.getElementById("loginBtnMobile");
      const logoutBtnMobile = document.getElementById("logoutBtnMobile");

      if (user) {
        const label = user.email || user.displayName || user.uid;
        status.textContent = label;
        hint.textContent = "Signed in with Google";
        avatar.textContent = (label[0] || "?").toUpperCase();
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        loginBtnMobile.style.display = "none";
        logoutBtnMobile.style.display = "inline-block";
      } else {
        status.textContent = "Not Logged In";
        hint.textContent = "Tap login to connect Google";
        avatar.textContent = "?";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        loginBtnMobile.style.display = "inline-block";
        logoutBtnMobile.style.display = "none";
      }
    }

    auth.onAuthStateChanged(user => {
      currentUser = user || null;
      updateLoginUI(currentUser);
    });

    document.getElementById("loginBtn").onclick =
    document.getElementById("loginBtnMobile").onclick = function () {
      auth.signInWithPopup(provider);
    };
    document.getElementById("logoutBtn").onclick =
    document.getElementById("logoutBtnMobile").onclick = function () {
      auth.signOut();
    };

    document.getElementById("nextDayBtn").onclick = () => {
      if (records.length === 0) return alert("Table is empty.");
      if (!confirm("Next Day?\nOB = previous CB, CB unchanged, sales recalculated.")) return;

      records = records.map(r => {
        const brand = r[0];
        const ml    = r[1];
        const oldCB = Number(r[3] || 0);
        const price = Number(r[5] || 0);

        const newOB = oldCB;
        const newCB = oldCB;
        const sales = newOB - newCB;
        const sv    = price * sales;
        const cbv   = price * newCB;

        return [brand, ml, newOB, newCB, sales, price, sv, cbv];
      });

      saveData();
      renderGroupedTables();
      alert("Next day applied.");
    };

    async function storeToCloud() {
      if (!currentUser) return alert("Please login first.");
      if (records.length === 0) return alert("No data to store.");
      const listName = prompt("Enter name for this report (e.g. date):", new Date().toLocaleDateString());
      if (!listName) return;
      const dataForFirestore = records.map(r => ({
        brand: r[0],
        ml: r[1],
        ob: r[2],
        cb: r[3],
        sales: r[4],
        price: r[5],
        sv: r[6],
        cbv: r[7]
      }));
      try {
        await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .add({
            name: listName,
            data: dataForFirestore,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        alert("Saved to cloud.");
      } catch (e) {
        console.error(e);
        alert("Error saving: " + e.message);
      }
    }
    document.getElementById("storeCloudBtn").onclick = () => { storeToCloud(); };

    async function showCloudLists() {
      if (!currentUser) return alert("Please login first.");
      const modal = document.getElementById("listModal");
      const listDiv = document.getElementById("cloudDataList");
      modal.style.display = "flex";
      listDiv.textContent = "Loading...";
      try {
        const snap = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .orderBy("timestamp", "desc")
          .get();
        listDiv.innerHTML = "";
        if (snap.empty) {
          listDiv.textContent = "No cloud reports found.";
          return;
        }
        snap.forEach(docSnap => {
          const d = docSnap.data();
          const count = (d.data || []).length;
          const div = document.createElement("div");
          div.style.margin = "8px 0";
          div.innerHTML =
            "<strong>" + (d.name || "(no name)") + "</strong> (" + count + " rows) " +
            "<button onclick=\"loadCloudReport('" + docSnap.id + "')\" class=\"ml-2 pill-button inline-flex items-center justify-center bg-brand-600 px-3 py-1.5 text-[11px] font-semibold text-white shadow-soft hover:bg-brand-500 transition\">Load</button>";
          listDiv.appendChild(div);
        });
      } catch (e) {
        console.error(e);
        listDiv.textContent = "Error: " + e.message;
      }
    }
    document.getElementById("listBtn").onclick = () => { showCloudLists(); };

    window.loadCloudReport = async (id) => {
      if (!currentUser) return alert("Please login first.");
      if (!confirm("Overwrite current table with this cloud report?")) return;
      try {
        const docSnap = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .doc(id)
          .get();
        if (!docSnap.exists) {
          alert("Report not found.");
          return;
        }
        const d = docSnap.data();
        const recs = d.data || [];
        records = recs.map(o => [
          o.brand, o.ml, o.ob, o.cb, o.sales, o.price, o.sv, o.cbv
        ]);
        saveData();
        renderGroupedTables();
        document.getElementById("listModal").style.display = "none";
      } catch (e) {
        console.error(e);
        alert("Error loading: " + e.message);
      }
    };

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const rootHtml = document.documentElement;

    function setTheme(isDark) {
      if (isDark) {
        rootHtml.classList.add('dark');
        themeIcon.textContent = '🌙';
        if (themeLabel) themeLabel.textContent = 'Dark';
        try { localStorage.setItem('ui-theme', 'dark'); } catch {}
      } else {
        rootHtml.classList.remove('dark');
        themeIcon.textContent = '☀️';
        if (themeLabel) themeLabel.textContent = 'Light';
        try { localStorage.setItem('ui-theme', 'light'); } catch {}
      }
    }

    (function initTheme() {
      let stored = null;
      try { stored = localStorage.getItem('ui-theme'); } catch {}
      if (stored === 'dark') setTheme(true);
      else if (stored === 'light') setTheme(false);
      else {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark);
      }
    })();

    themeToggle.addEventListener('click', function () {
      const isDark = rootHtml.classList.contains('dark');
      setTheme(!isDark);
    });

    loadData();
    renderBrandOptions("");
    renderGroupedTables();
  </script>
