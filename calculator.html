<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ⓜ️GROUPS</title>
<style>

/* ===== ANIMATIONS ONLY ===== */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  0%   { opacity: 0; transform: scale(0.85); }
  70%  { transform: scale(1.04); }
  100% { opacity: 1; transform: scale(1); }
}

/* Apply animations */
body {
  animation: fadeIn 0.5s ease;
  background: aquamarine;
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  margin-top: 10px;
  animation: slideDown 0.6s ease;
}

form {
  background: rgb(191, 183, 187);
  text-align: center;
  padding: 15px 18px;
  margin: 10px auto;
  width: fit-content;
  border-radius: 10px;
  animation: slideUp 0.7s ease;
}

table {
  background: antiquewhite;
  margin: 12px auto;
  border-collapse: collapse;
  width: 95%;
  max-width: 1100px;
  animation: slideUp 0.6s ease;
}

th, td {
  border: 1px solid #333;
  padding: 6px 10px;
}

th { background: #f1e2c6; }

.groupTitle {
  text-align: center;
  margin: 18px 0 6px;
  animation: slideDown 0.5s ease;
}

.totalsTable {
  width: 95%;
  max-width: 1100px;
  margin: 0 auto 18px;
  background: yellow;
  font-weight: bold;
  animation: slideUp 0.5s ease;
}

#qwe, .qwe {
  background: red;
  color: #fff;
  padding: 8px 14px;
  border: 0;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
#qwe:hover, .qwe:hover {
  transform: scale(1.07);
  opacity: 0.88;
}

#muhil, .muhil {
  background: green;
  color: #fff;
  padding: 8px 14px;
  border: 0;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
#muhil:hover, .muhil:hover {
  transform: scale(1.07);
  opacity: 0.88;
}

input, select { padding: 6px; }

.editing { background: #ffeeba; }

/* ===== BACK BUTTON ===== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #333;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  margin: 10px 10px 0 10px;
  animation: slideDown 0.5s ease;
  transition: background 0.2s, transform 0.15s;
}
.back-btn:hover {
  background: #555;
  transform: translateX(-3px);
}
.back-btn svg {
  width: 16px;
  height: 16px;
}

/* ===== AUTH BAR ===== */
.auth-bar {
  background: #333;
  color: white;
  padding: 8px 10px;
  margin: 5px auto 0;
  max-width: 1100px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 6px;
  font-size: 14px;
  animation: slideDown 0.6s ease;
}
.auth-bar button {
  padding: 5px 10px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.auth-bar button:hover {
  transform: scale(1.08);
  opacity: 0.9;
}

/* ===== CLOUD LIST MODAL ===== */
#listModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  animation: fadeIn 0.3s ease;
}
.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  max-width: 600px;
  animation: popIn 0.4s ease;
}

/* ===== SUBMIT / RESET BUTTONS ===== */
input[type="submit"],
input[type="reset"] {
  transition: transform 0.15s, opacity 0.15s;
  cursor: pointer;
}
input[type="submit"]:hover { transform: scale(1.07); }
input[type="reset"]:hover  { opacity: 0.75; }

/* ===== PRINT ===== */
@media print {
  form,
  #printBtn,
  #muhil,
  #qwe,
  .muhil,
  .qwe,
  #eraseBox,
  #eraseForm,
  #eraseBtn,
  #eraseSubmit,
  .auth-bar,
  #listModal,
  #cloudButtons,
  .back-btn {
    display: none !important;
  }

  body { background: white !important; }

  table {
    width: 100% !important;
    max-width: 100% !important;
    background: white !important;
    color: black !important;
  }

  th {
    background: #f2f2f2 !important;
    color: black !important;
    border: 1px solid black !important;
  }

  td {
    color: black !important;
    border: 1px solid black !important;
  }

  .totalsTable {
    background: #fffde7 !important;
    color: black !important;
    page-break-inside: avoid;
  }

  h2 { page-break-after: avoid; }
  h1 { color: black !important; }

  .groupTitle { color: black !important; }
}

</style>

function printReport() {
  renderGroupedTables();
  window.print();
}

const BRANDS = [...new Set(PRICELIST.map(x => x.brand))].sort();
const STORAGEKEY = "calcrecords";
let records = [];

function loadData() {
  const saved = localStorage.getItem(STORAGEKEY);
  if (saved) records = JSON.parse(saved);
}
function saveData() {
  localStorage.setItem(STORAGEKEY, JSON.stringify(records));
}

const form        = document.getElementById("information");
const brandInput  = document.getElementById("brand");
const mlSelect    = document.getElementById("ml");
const priceInput  = document.getElementById("price");
const datalist    = document.getElementById("suggestions");

brandInput.setAttribute("list", "suggestions");

function renderBrandOptions(filterText) {
  datalist.innerHTML = "";
  const q = (filterText || "").toLowerCase();
  BRANDS.filter(b => b.toLowerCase().includes(q))
    .slice(0, 30)
    .forEach(b => {
      const opt = document.createElement("option");
      opt.value = b;
      datalist.appendChild(opt);
    });
}

function autoApplyPrice() {
  const brand = brandInput.value.trim();
  const ml    = parseFloat(mlSelect.value || 0);
  if (!brand || !ml) return;
  const match = PRICELIST.find(x => x.brand === brand && x.ml === ml);
  priceInput.value = match ? match.price : "";
}

brandInput.addEventListener("input", () => {
  renderBrandOptions(brandInput.value);
  autoApplyPrice();
});
brandInput.addEventListener("focus", () => renderBrandOptions(brandInput.value));
mlSelect.addEventListener("change", autoApplyPrice);

function money(n) { return (Number(n) || 0).toFixed(2); }
function sumField(arr, idx) {
  return arr.reduce((a, r) => a + (Number(r[idx]) || 0), 0);
}

function compareByPriceThenBrand(a, b) {
  if (Number(a[5]) !== Number(b[5])) return Number(a[5]) - Number(b[5]);
  return (a[0]||"").toLowerCase().localeCompare((b[0]||"").toLowerCase());
}
function compareObjByPriceThenBrand(x, y) {
  const ra = x.rec || x.r;
  const rb = y.rec || y.r;
  return compareByPriceThenBrand(ra, rb);
}

  { key:"500",  title:"Table 8: 500 ml",  filter: r => r[1]===500 },
];

function renderGroupedTables() {
  const host = document.getElementById("groups");
  host.innerHTML = "";

  let t9OB=0,t9CB=0,t9Sales=0,t9SV=0,t9CBV=0;
  let t10OB=0,t10CB=0,t10Sales=0,t10SV=0,t10CBV=0;

  GROUPS.forEach((g, idx) => {
    const rows = records.filter(g.filter).slice().sort(compareByPriceThenBrand);

    const totalOB    = sumField(rows, 2);
    const totalCB    = sumField(rows, 3);
    const totalSales = sumField(rows, 4);
    const totalSV    = sumField(rows, 6);
    const totalCBV   = sumField(rows, 7);

    if (idx >= 0 && idx <= 5) {
      t9OB+=totalOB; t9CB+=totalCB; t9Sales+=totalSales;
      t9SV+=totalSV; t9CBV+=totalCBV;
    }
    if (idx >= 6 && idx <= 7) {
      t10OB+=totalOB; t10CB+=totalCB; t10Sales+=totalSales;
      t10SV+=totalSV; t10CBV+=totalCBV;
    }

    const title = document.createElement("h2");
    title.className = "groupTitle";
    title.textContent = g.title;
    host.appendChild(title);

    const t = document.createElement("table");
    t.innerHTML = `
      <thead>
        <tr>
          <th>S.No</th><th>Brand</th><th>ML</th><th>OB</th><th>CB</th>
          <th>Sales</th><th>Price</th><th>Sales Value</th><th>CB Value</th>
        </tr>
      </thead>
      <tbody>
        ${rows.length === 0
          ? `<tr><td colspan="9" style="text-align:center">No records</td></tr>`
          : rows.map((r,i) => `
            <tr>
              <td>${i+1}</td>
              <td>${r[0]}</td>
              <td>${r[1]}</td>
              <td>${r[2]}</td>
              <td>${r[3]}</td>
              <td>${r[4]}</td>
              <td>${r[5]}</td>
              <td>${money(r[6])}</td>
              <td>${money(r[7])}</td>
            </tr>`).join("")
        }
      </tbody>`;
    host.appendChild(t);

    const totals = document.createElement("table");
    totals.className = "totalsTable";
    totals.innerHTML = `
      <tr>
        <td>Total OB BOT: ${money(totalOB)}</td>
        <td>Total CB BOT: ${money(totalCB)}</td>
        <td>Total Sales BOT: ${money(totalSales)}</td>
        <td>Total Sales Value: ${money(totalSV)}</td>
        <td>Total CB Value: ${money(totalCBV)}</td>
      </tr>`;
    host.appendChild(totals);
  });

  /* IMSF */
  const t9Title = document.createElement("h2");
  t9Title.className = "groupTitle";
  t9Title.textContent = "(IMSF)";
  host.appendChild(t9Title);
  const t9T = document.createElement("table");
  t9T.className = "totalsTable";
  t9T.innerHTML = `<tr>
    <td>Total OB BOT: ${money(t9OB)}</td>
    <td>Total CB BOT: ${money(t9CB)}</td>
    <td>Total Sales BOT: ${money(t9Sales)}</td>
    <td>Total Sales Value: ${money(t9SV)}</td>
    <td>Total CB Value: ${money(t9CBV)}</td>
  </tr>`;
  host.appendChild(t9T);

  /* BEER */
  const t10Title = document.createElement("h2");
  t10Title.className = "groupTitle";
  t10Title.textContent = "(BEER)";
  host.appendChild(t10Title);
  const t10T = document.createElement("table");
  t10T.className = "totalsTable";
  t10T.innerHTML = `<tr>
    <td>Total OB BOT: ${money(t10OB)}</td>
    <td>Total CB BOT: ${money(t10CB)}</td>
    <td>Total Sales BOT: ${money(t10Sales)}</td>
    <td>Total Sales Value: ${money(t10SV)}</td>
    <td>Total CB Value: ${money(t10CBV)}</td>
  </tr>`;
  host.appendChild(t10T);

  /* GRAND TOTAL */
  const grandTitle = document.createElement("h2");
  grandTitle.className = "groupTitle";
  grandTitle.textContent = "Total(IMSF&BEER)";
  host.appendChild(grandTitle);
  const grandT = document.createElement("table");
  grandT.className = "totalsTable";
  grandT.innerHTML = `<tr>
    <td>Total OB BOT: ${money(t9OB+t10OB)}</td>
    <td>Total CB BOT: ${money(t9CB+t10CB)}</td>
    <td>Total Sales BOT: ${money(t9Sales+t10Sales)}</td>
    <td>Total Sales Value: ${money(t9SV+t10SV)}</td>
    <td>Total CB Value: ${money(t9CBV+t10CBV)}</td>
  </tr>`;
  host.appendChild(grandT);
}

/* ===== EDIT ALL ===== */
const editAllBtn = document.getElementById("editAllBtn");
const saveAllBtn = document.getElementById("saveAllBtn");
let editAllActive = false;
let currentEditGroupIndex = null;

editAllBtn.addEventListener("click", function() {
  if (editAllActive) { alert("Already in Edit All mode. Click SAVE."); return; }
  renderGroupedTables();
  const host   = document.getElementById("groups");
  const tables = host.querySelectorAll("table");
  tables.forEach(t => {
    const hdr = t.querySelector("thead th");
    if (!hdr || hdr.textContent.trim() !== "S.No") return;
    t.querySelectorAll("tbody tr").forEach(row => {
      const cells = row.querySelectorAll("td");
      if (cells.length < 9) return;
      cells[3].contentEditable = "true"; cells[3].classList.add("editing");
      cells[5].contentEditable = "true"; cells[5].classList.add("editing");
    });
  });
  editAllActive = true;
  editAllBtn.style.display = "none";
  saveAllBtn.style.display = "inline-block";
});

function saveAllFromAllTables() {
  const host   = document.getElementById("groups");
  const tables = host.querySelectorAll("table");
  GROUPS.forEach((g, groupIndex) => {
    const groupRows = records.map((rec,idx)=>({rec,idx}))
      .filter(x=>g.filter(x.rec)).sort(compareObjByPriceThenBrand);
    if (!groupRows.length) return;
    const table = tables[groupIndex * 2];
    if (!table) return;
    let gi = 0;
    table.querySelectorAll("tbody tr").forEach(rowEl => {
      const cells = rowEl.querySelectorAll("td");
      if (cells.length < 9) return;
      cells[3].contentEditable="false"; cells[3].classList.remove("editing");
      cells[5].contentEditable="false"; cells[5].classList.remove("editing");
      const newOB    = Number(cells[3].textContent||0);
      const newSales = Number(cells[5].textContent||0);
      const price    = Number(cells[6].textContent||0);
      const newCB    = newOB - newSales;
      cells[4].textContent = money(newCB);
      cells[7].textContent = money(price*newSales);
      cells[8].textContent = money(price*newCB);
      const rec = records[groupRows[gi].idx];
      rec[2]=newOB; rec[4]=newSales; rec[3]=newCB;
      rec[6]=price*newSales; rec[7]=price*newCB;
      gi++;
    });
  });
  saveData(); renderGroupedTables();
  editAllActive=false;
  saveAllBtn.style.display="none";
  editAllBtn.style.display="inline-block";
}

function saveSingleGroup(idx) {
  const host   = document.getElementById("groups");
  const tables = host.querySelectorAll("table");
  const table  = tables[idx*2];
  if (!table) return;
  const g = GROUPS[idx];
  const groupRows = records.map((rec,i)=>({rec,idx:i}))
    .filter(x=>g.filter(x.rec)).sort(compareObjByPriceThenBrand);
  for (let i=1; i<table.rows.length && i<=groupRows.length; i++){
    const rowEl = table.rows[i];
    const obCell = rowEl.cells[3];
    const cbCell = rowEl.cells[4];
    if (!obCell||!cbCell) continue;
    obCell.contentEditable="false"; cbCell.contentEditable="false";
    obCell.classList.remove("editing"); cbCell.classList.remove("editing");
    const newOB=parseFloat(obCell.textContent||0);
    const newCB=parseFloat(cbCell.textContent||0);
    const rec=records[groupRows[i-1].idx];
    rec[2]=newOB; rec[3]=newCB; rec[4]=newOB-newCB;
    rec[6]=rec[5]*rec[4]; rec[7]=rec[5]*rec[3];
  }
  saveData(); renderGroupedTables();
  currentEditGroupIndex=null;
  saveAllBtn.style.display="none";
  editAllBtn.style.display="inline-block";
}

saveAllBtn.addEventListener("click", function() {
  if (editAllActive) { saveAllFromAllTables(); return; }
  if (typeof currentEditGroupIndex==="number") saveSingleGroup(currentEditGroupIndex);
});

/* ===== FORM SUBMIT ===== */
form.addEventListener("submit", function(e) {
  e.preventDefault();
  const brand = brandInput.value.trim();
  const ml    = parseFloat(mlSelect.value||0);
  const ob    = parseFloat(document.getElementById("ob").value||0);
  const cb    = parseFloat(document.getElementById("cb").value||0);
  const price = parseFloat(priceInput.value||0);
  if (!brand||!ml||!price) {
    alert("Please select Brand + ML. Price will auto-fill.");
    return;
  }
  const sales=ob-cb, sv=price*sales, cbv=price*cb;
  const newRecord=[brand,ml,ob,cb,sales,price,sv,cbv];
  const groupIndex=GROUPS.findIndex(g=>g.filter(newRecord));
  if (groupIndex===-1){ alert("Doesn't match any table."); return; }

  const editIndexStr=localStorage.getItem("editIndex");
  if (editIndexStr!==null){
    records[parseInt(editIndexStr,10)]=newRecord;
    localStorage.removeItem("editIndex");
    alert("Row updated.");
  } else {
    const dup=records.some(r=>GROUPS[groupIndex].filter(r)&&(r[0]||"").toLowerCase()===brand.toLowerCase());
    if (dup){ alert(`"${brand}" already exists in Table ${groupIndex+1}.`); return; }
    records.push(newRecord);
  }
  saveData(); renderGroupedTables();
  form.reset(); datalist.innerHTML="";
});

document.getElementById("eraseBtn").addEventListener("click",()=>{

document.getElementById("eraseSubmit").addEventListener("click",()=>{
  const tno=parseInt(document.getElementById("eraseTableNo").value,10);
  const rno=parseInt(document.getElementById("eraseRowNo").value,10);
  if (!Number.isInteger(tno)||tno<1||tno>8){ alert("Enter table 1-8"); return; }
  if (!Number.isInteger(rno)||rno<1){ alert("Enter row number"); return; }
  const g=GROUPS[tno-1];
  const tableRows=records.map((rec,idx)=>({rec,idx})).filter(x=>g.filter(x.rec)).sort(compareObjByPriceThenBrand);
  if (!tableRows.length){ alert("No records in this table"); return; }
  if (rno>tableRows.length){ alert(`Only ${tableRows.length} rows`); return; }
  records.splice(tableRows[rno-1].idx,1);
  saveData(); renderGroupedTables();
  document.getElementById("eraseTableNo").value="";
  document.getElementById("eraseRowNo").value="";
});

document.getElementById("muhil").addEventListener("click",function(){

  if (tno<1||tno>8||rno<1){ alert("Invalid."); return; }
  const g=GROUPS[tno-1];
  const gr=records.map((r,idx)=>({r,idx})).filter(o=>g.filter(o.r)).sort((a,b)=>compareByPriceThenBrand(a.r,b.r));
  if (!gr.length){ alert("No records."); return; }
  if (rno>gr.length){ alert(`Only ${gr.length} rows.`); return; }
  const target=gr[rno-1];
  brandInput.value=target.r[0];
  mlSelect.value=target.r[1];
  document.getElementById("ob").value=target.r[2];
  document.getElementById("cb").value=target.r[3];
  priceInput.value=target.r[5];
  localStorage.setItem("editIndex",target.idx);
  alert("Row loaded. Edit and Submit.");
});

async function storeToCloud(){
  if(!currentUser) return alert("Please login first.");
  if(!records.length) return alert("No data to store.");
  const listName=prompt("Report name:",new Date().toLocaleDateString());
  if(!listName) return;
  const data=records.map(r=>({brand:r[0],ml:r[1],ob:r[2],cb:r[3],sales:r[4],price:r[5],sv:r[6],cbv:r[7]}));
  try {
    await db.collection("users").doc(currentUser.uid).collection("reports").add({
      name:listName,data,timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Saved to cloud.");
  } catch(e){ console.error(e); alert("Error: "+e.message); }
}
document.getElementById("storeCloudBtn").onclick=storeToCloud;

/* ===== CLOUD LIST ===== */
async function showCloudLists(){
  if(!currentUser) return alert("Please login first.");
  const modal=document.getElementById("listModal");
  const listDiv=document.getElementById("cloudDataList");
  modal.style.display="block";
  listDiv.textContent="Loading...";
  try {
    const snap=await db.collection("users").doc(currentUser.uid).collection("reports")
      .orderBy("timestamp","desc").get();
    listDiv.innerHTML="";
    if(snap.empty){ listDiv.textContent="No cloud reports found."; return; }
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      const div=document.createElement("div");
      div.style.margin="8px 0";
      div.innerHTML=`<strong>${d.name||"(no name)"}</strong> (${(d.data||[]).length} rows)
        <button onclick="loadCloudReport('${docSnap.id}')">Load</button>`;
      listDiv.appendChild(div);
    });
  } catch(e){ console.error(e); listDiv.textContent="Error: "+e.message; }
}
document.getElementById("listBtn").onclick=showCloudLists;

window.loadCloudReport=async(id)=>{
  if(!currentUser) return alert("Please login first.");
  if(!confirm("Overwrite current data?")) return;
  try {
    const docSnap=await db.collection("users").doc(currentUser.uid).collection("reports").doc(id).get();
    if(!docSnap.exists){ alert("Not found."); return; }
    records=(docSnap.data().data||[]).map(o=>[o.brand,o.ml,o.ob,o.cb,o.sales,o.price,o.sv,o.cbv]);
    saveData(); renderGroupedTables();
    document.getElementById("listModal").style.display="none";
  } catch(e){ console.error(e); alert("Error: "+e.message); }
};
