<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shop 2605 - Home</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }
    .wrapper {
      text-align: center;
    }
    .wrapper h1 {
      margin-bottom: 20px;
    }
    .calc-btn {
      border: none;
      padding: 0;
      background: none;
      cursor: pointer;
    }
    .calc-btn img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .calc-btn img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,0,0,0.9);
    }
    .label {
      margin-top: 10px;
      font-size: 18px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>SHOP NO: 2605</h1>

    <!-- Picture button -->
    <button class="calc-btn" onclick="location.href='calculator.html'">
      <img src="calculator.jpg" alt="Calculator">
    </button>

    <div class="label">Calculator</div>
  </div>
</body>
</html>
