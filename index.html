  <style>
    body { background: aquamarine; font-family: Arial, sans-serif; }
    h1 { text-align: center; margin-top: 10px; }
    form {
      background: rgb(191, 183, 187);
      text-align: center;
      padding: 15px 18px;
      margin: 10px auto;
      width: fit-content;
      border-radius: 10px;
    }
    table {
      background: antiquewhite;
      margin: 12px auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1100px;
    }
    th, td { border: 1px solid #333; padding: 6px 10px; }
    th { background: #f1e2c6; }
    .groupTitle { text-align: center; margin: 18px 0 6px; }
    .totalsTable {
      width: 95%;
      max-width: 1100px;
      margin: 0 auto 18px;
      background: yellow;
      font-weight: bold;
    }
    #qwe { background: red; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }
    #muhil { background: green; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }
    input, select { padding: 6px; }
    .editing { background: #ffeeba; }

    /* Auth bar */
    .auth-bar {
      background: #333;
      color: white;
      padding: 8px 10px;
      margin: 5px auto 0;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 6px;
      font-size: 14px;
    }
    .auth-bar button {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Cloud list modal */
    #listModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }
    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
    }

    @media print {
      form,
      #printBtn,
      #muhil,
      #qwe,
      .muhil,
      .qwe,
      #eraseBox,
      #eraseForm,
      #eraseBtn,
      #eraseSubmit,
      .auth-bar,
      #listModal,
      #cloudButtons {
        display: none !important;
      }
      body {
        background: white !important;
      }
      table {
        width: 100% !important;
        max-width: 100% !important;
      }
      .totalsTable {
        page-break-inside: avoid;
      }
      h2 {
        page-break-after: avoid;
      }
    }
  </style>
</head>

    function printReport() {
      renderGroupedTables();
      window.print();
    }

    const BRANDS = [...new Set(PRICELIST.map(x => x.brand))].sort();

    const STORAGEKEY = "calcrecords";
    let records = [];

    function loadData() {
      const saved = localStorage.getItem(STORAGEKEY);
      if (saved) records = JSON.parse(saved);
    }
    function saveData() {
      localStorage.setItem(STORAGEKEY, JSON.stringify(records));
    }

    const form = document.getElementById("information");
    const brandInput = document.getElementById("brand");
    const mlSelect = document.getElementById("ml");
    const priceInput = document.getElementById("price");
    const datalist = document.getElementById("suggestions");

    brandInput.setAttribute("list", "suggestions");

    function renderBrandOptions(filterText) {
      datalist.innerHTML = "";
      const q = (filterText || "").toLowerCase();
      BRANDS
        .filter(b => b.toLowerCase().includes(q))
        .slice(0, 30)
        .forEach(b => {
          const opt = document.createElement("option");
          opt.value = b;
          datalist.appendChild(opt);
        });
    }

    function autoApplyPrice() {
      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      if (!brand || !ml) return;
      const match = PRICELIST.find(x => x.brand === brand && x.ml === ml);
      priceInput.value = match ? match.price : "";
    }

    brandInput.addEventListener("input", () => {
      renderBrandOptions(brandInput.value);
      autoApplyPrice();
    });
    brandInput.addEventListener("focus", () => renderBrandOptions(brandInput.value));
    mlSelect.addEventListener("change", autoApplyPrice);

    function money(n) { return (Number(n) || 0).toFixed(2); }
    function sumField(arr, idx) { return arr.reduce((a, r) => a + (Number(r[idx]) || 0), 0); }

    const GROUPS = [
      { key: "180_140",   title: "Table 1: 180 ml (Price <= 140)",  filter: r => r[1] === 180 && r[5] <= 140 },
      { key: "180_170",   title: "Table 2: 180 ml (Price = 170)",  filter: r => r[1] === 180 && r[5] === 170 },
      { key: "180_gt200", title: "Table 3: 180 ml (Price >= 200)",  filter: r => r[1] === 180 && r[5] >= 200 },
      { key: "375",  title: "Table 4: 375 ml",  filter: r => r[1] === 375 },
      { key: "750",  title: "Table 5: 750 ml",  filter: r => r[1] === 750 },
      { key: "1000", title: "Table 6: 1000 ml", filter: r => r[1] === 1000 },
      { key: "650",  title: "Table 7: 650 ml",  filter: r => r[1] === 650 },
      { key: "500",  title: "Table 8: 500 ml",  filter: r => r[1] === 500 },
    ];

    function renderGroupedTables() {
      const host = document.getElementById("groups");
      host.innerHTML = "";

      let t9OB = 0, t9CB = 0, t9Sales = 0, t9SV = 0, t9CBV = 0;
      let t10OB = 0, t10CB = 0, t10Sales = 0, t10SV = 0, t10CBV = 0;

      GROUPS.forEach((g, idx) => {
        const rows = records
          .filter(g.filter)
          .slice()
          .sort((a, b) => {
            const priceA = Number(a.rec[5]);
            const priceB =Number(b.rec[5]);
            if (priceA !== priceB) return priceA - priceB;
            const brandA = (a.rec[0] || "").tolowercase();
            const brandB = (b.rec[0] || "").tolowercase();
            return brandA.localeCompare(brandB);
                  });

        const totalOB = sumField(rows, 2);
        const totalCB = sumField(rows, 3);
        const totalSales = sumField(rows, 4);
        const totalSV = sumField(rows, 6);
        const totalCBV = sumField(rows, 7);

        if (idx >= 0 && idx <= 5) {
          t9OB += totalOB; t9CB += totalCB; t9Sales += totalSales; t9SV += totalSV; t9CBV += totalCBV;
        }
        if (idx >= 6 && idx <= 7) {
          t10OB += totalOB; t10CB += totalCB; t10Sales += totalSales; t10SV += totalSV; t10CBV += totalCBV;
        }

        const title = document.createElement("h2");
        title.className = "groupTitle";
        title.textContent = g.title;
        host.appendChild(title);

        const t = document.createElement("table");
        t.innerHTML = `
          <thead>
            <tr>
              <th>S.No</th><th>Brand</th><th>ML</th><th>OB</th><th>CB</th>
              <th>Sales</th><th>Price</th><th>Sales Value</th><th>CB Value</th>
            </tr>
          </thead>
          <tbody>
            ${
              rows.length === 0
                ? `<tr><td colspan="9" style="text-align:center">No records</td></tr>`
                : rows.map((r, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td>${r[0]}</td>
                    <td>${r[1]}</td>
                    <td>${r[2]}</td>
                    <td>${r[3]}</td>
                    <td>${r[4]}</td>
                    <td>${r[5]}</td>
                    <td>${money(r[6])}</td>
                    <td>${money(r[7])}</td>
                  </tr>
                `).join("")
            }
          </tbody>
        `;
        host.appendChild(t);

        const totals = document.createElement("table");
        totals.className = "totalsTable";
        totals.innerHTML = `
          <tr>
            <td>Total OB BOT: ${money(totalOB)}</td>
            <td>Total CB BOT: ${money(totalCB)}</td>
            <td>Total Sales BOT: ${money(totalSales)}</td>
            <td>Total Sales Value: ${money(totalSV)}</td>
            <td>Total CB Value: ${money(totalCBV)}</td>
          </tr>
        `;
        host.appendChild(totals);
      });

      const t9Title = document.createElement("h2");
      t9Title.className = "groupTitle";
      t9Title.textContent = "(IMSF)";
      host.appendChild(t9Title);

      const t9Totals = document.createElement("table");
      t9Totals.className = "totalsTable";
      t9Totals.innerHTML = `
        <tr>
          <td>Total OB BOT: ${money(t9OB)}</td>
          <td>Total CB BOT: ${money(t9CB)}</td>
          <td>Total Sales BOT: ${money(t9Sales)}</td>
          <td>Total Sales Value: ${money(t9SV)}</td>
          <td>Total CB Value: ${money(t9CBV)}</td>
        </tr>
      `;
      host.appendChild(t9Totals);

      const t10Title = document.createElement("h2");

const editAllBtn = document.getElementById("editAllBtn");
const saveAllBtn = document.getElementById("saveAllBtn");
let editAllActive = false;

editAllBtn.addEventListener("click", function () {
  if (editAllActive) {
    alert("Already in Edit All mode. Click SAVE to finish.");
    return;
  }

  // fresh DOM
  renderGroupedTables();

  const host = document.getElementById("groups");
  const tables = host.querySelectorAll("table");

  // main tables are all the ones that have header "S.No"
  tables.forEach(t => {
    const headerFirstCell = t.querySelector("thead th");
    if (!headerFirstCell) return;
    if (headerFirstCell.textContent.trim() !== "S.No") return;

    const rows = t.querySelectorAll("tbody tr");
    rows.forEach(row => {
      const cells = row.querySelectorAll("td");
      if (cells.length < 9) return; // skip "No records"
      const obCell    = cells[3];
      const salesCell = cells[5];
      obCell.contentEditable = "true";
      salesCell.contentEditable = "true";
      obCell.classList.add("editing");
      salesCell.classList.add("editing");
    });
  });

  editAllActive = true;
  editAllBtn.style.display = "none";
  saveAllBtn.style.display = "inline-block";
});

saveAllBtn.addEventListener("click", function () {
  if (!editAllActive) return;

  const host = document.getElementById("groups");
  const tables = host.querySelectorAll("table");

  // Rebuild records from each GROUP using current DOM values
  GROUPS.forEach((g, groupIndex) => {
    // Take all rows for this group from records, sorted by price (same as renderGroupedTables)
    const groupRows = records
      .map((rec, idx) => ({ rec, idx }))
      .filter(x => g.filter(x.rec))
      .sort((a, b) => Number(a.rec[5]) - Number(b.rec[5]));

    if (groupRows.length === 0) return;

    // main table index: 0,2,4,... for groupIndex 0..7
    const mainTableIndex = groupIndex * 2;
    const table = tables[mainTableIndex];
    if (!table) return;

    const bodyRows = table.querySelectorAll("tbody tr");
    let gi = 0;
    bodyRows.forEach(rowEl => {
      const cells = rowEl.querySelectorAll("td");
      if (cells.length < 9) return;

      const obCell    = cells[3];
      const cbCell    = cells[4];
      const salesCell = cells[5];
      const priceCell = cells[6];
      const svCell    = cells[7];
      const cbvCell   = cells[8];

      obCell.contentEditable = "false";
      salesCell.contentEditable = "false";
      obCell.classList.remove("editing");
      salesCell.classList.remove("editing");

      const newOB    = Number(obCell.textContent || 0);
      const newSales = Number(salesCell.textContent || 0);
      const price    = Number(priceCell.textContent || 0);
      const newCB    = newOB - newSales;
      const newSV    = price * newSales;
      const newCBV   = price * newCB;

      cbCell.textContent  = money(newCB);
      svCell.textContent  = money(newSV);
      cbvCell.textContent = money(newCBV);

      const recIndex = groupRows[gi].idx;
      const rec = records[recIndex];
      rec[2] = newOB;     // OB
      rec[4] = newSales;  // Sales
      rec[3] = newCB;     // CB
      rec[6] = newSV;     // Sales Value
      rec[7] = newCBV;    // CB Value

      gi++;
    });
  });

  saveData();
  renderGroupedTables();

  editAllActive = false;
  saveAllBtn.style.display = "none";
  editAllBtn.style.display = "inline-block";
});









    saveAllBtn.addEventListener("click", function () {
      if (currentEditGroupIndex === null) return;
      const host = document.getElementById("groups");
      const allTables = host.querySelectorAll("table");
      const mainTableIndex = currentEditGroupIndex * 2;
      const table = allTables[mainTableIndex];
      if (!table) return;
      const g = GROUPS[currentEditGroupIndex];
      const groupRows = records
        .map((rec, idx) => ({ rec, idx }))
        .filter(x => g.filter(x.rec))
        .sort((a, b) => Number(a.rec[5]) - Number(b.rec[5]));
      for (let i = 1; i < table.rows.length && i <= groupRows.length; i++) {
        const rowEl = table.rows[i];
        const obCell = rowEl.cells[3];
        const cbCell = rowEl.cells[4];
        if (!obCell || !cbCell) continue;
        obCell.contentEditable = "false";
        cbCell.contentEditable = "false";
        obCell.classList.remove("editing");
        cbCell.classList.remove("editing");
        const newOB = parseFloat(obCell.textContent || 0);
        const newCB = parseFloat(cbCell.textContent || 0);
        const recIndex = groupRows[i - 1].idx;
        const rec = records[recIndex];
        rec[2] = newOB;
        rec[3] = newCB;
        rec[4] = newOB - newCB;
        rec[6] = rec[5] * rec[4];
        rec[7] = rec[5] * rec[3];
      }
      saveData();
      renderGroupedTables();
      currentEditGroupIndex = null;
      saveAllBtn.style.display = "none";
      editAllBtn.style.display = "inline-block";
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      const ob = parseFloat(document.getElementById("ob").value || 0);
      const cb = parseFloat(document.getElementById("cb").value || 0);
      const price = parseFloat(priceInput.value || 0);
      if (!brand || !ml || !price) {
        alert("Please select Brand + ML. Price will auto-fill. If price is empty, add that brand+ml in PRICELIST.");
        return;
      }
      const sales = ob - cb;
      const sv = price * sales;
      const cbv = price * cb;

      const newRecord = [brand, ml, ob, cb, sales, price, sv, cbv];
      const groupIndex = GROUPS.findIndex(g => g.filter(newRecord));
      if (groupIndex === -1) {
        alert("This record doesn't match any table rules.");
        return;
      }

      const editIndexStr = localStorage.getItem("editIndex");
      const isEditing = editIndexStr !== null;
      const editIndex = isEditing ? parseInt(editIndexStr, 10) : -1;

      if (isEditing) {
        records[editIndex] = newRecord;
        localStorage.removeItem("editIndex");
        alert("Row updated successfully.");
      } else {
        const duplicateInSameTable = records.some(r =>
          GROUPS[groupIndex].filter(r) && r[0].toLowerCase() === brand.toLowerCase()
        );
        if (duplicateInSameTable) {
          alert(`"${brand}" already exists in Table ${groupIndex + 1}. Not added.`);
          return;
        }
        records.push(newRecord);
      }

      saveData();
      renderGroupedTables();
      form.reset();
      brandInput.setAttribute("list", "suggestions");
      datalist.innerHTML = "";
    });

    const eraseBtn = document.getElementById("eraseBtn");
    const eraseFormDiv = document.getElementById("eraseForm");
    const eraseSubmit = document.getElementById("eraseSubmit");

    eraseBtn.addEventListener("click", () => {
      eraseFormDiv.style.display = eraseFormDiv.style.display === "none" ? "block" : "none";
    });

    eraseSubmit.addEventListener("click", () => {
      const tno = parseInt(document.getElementById("eraseTableNo").value, 10);
      const rno = parseInt(document.getElementById("eraseRowNo").value, 10);
      if (!Number.isInteger(tno) || tno < 1 || tno > 8) {
        alert("Enter table number 1 to 8");
        return;
      }
      if (!Number.isInteger(rno) || rno < 1) {
        alert("Enter row number N (1,2,3...)");
        return;
      }
      const g = GROUPS[tno - 1];
      const tableRows = records
        .map((rec, idx) => ({ rec, idx }))
        .filter(x => g.filter(x.rec))
        .sort((a, b) => Number(a.rec[5]) - Number(b.rec[5]));
      if (tableRows.length === 0) {
        alert("No records in this table");
        return;
      }
      if (rno > tableRows.length) {
        alert(`This table has only ${tableRows.length} rows`);
        return;
      }
      const removeIndex = tableRows[rno - 1].idx;
      records.splice(removeIndex, 1);
      saveData();
      renderGroupedTables();
      document.getElementById("eraseTableNo").value = "";
      document.getElementById("eraseRowNo").value = "";
    });

    document.getElementById("muhil").addEventListener("click", function () {

      if (tableNoStr === null) return;

      const tableNo = parseInt(tableNoStr, 10);

      if (!Number.isInteger(tableNo) || !Number.isInteger(rowNo) || tableNo < 1 || tableNo > 8 || rowNo < 1) {
        alert("Invalid table or row number.");
        return;
      }
      const groupIndex = tableNo - 1;
      const g = GROUPS[groupIndex];
      const groupRecords = records
        .map((r, idx) => ({ r, idx }))
        .filter(obj => g.filter(obj.r))
        .sort((a, b) => Number(a.r[5]) - Number(b.r[5]));
      if (groupRecords.length === 0) {
        alert("No records in this table.");
        return;
      }
      if (rowNo > groupRecords.length) {
        alert(`This table has only ${groupRecords.length} rows.`);

    async function storeToCloud() {
      if (!currentUser) return alert("Please login first.");
      if (records.length === 0) return alert("No data to store.");
      const listName = prompt("Enter name for this report (e.g. date):", new Date().toLocaleDateString());
      if (!listName) return;
      const dataForFirestore = records.map(r => ({
        brand: r[0],
        ml: r[1],
        ob: r[2],
        cb: r[3],
        sales: r[4],
        price: r[5],
        sv: r[6],
        cbv: r[7]
      }));
      try {
        await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .add({
            name: listName,
            data: dataForFirestore,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        alert("Saved to cloud.");
      } catch (e) {
        console.error(e);
        alert("Error saving: " + e.message);
      }
    }
    document.getElementById("storeCloudBtn").onclick = () => { storeToCloud(); };

    async function showCloudLists() {
      if (!currentUser) return alert("Please login first.");
      const modal = document.getElementById("listModal");
      const listDiv = document.getElementById("cloudDataList");
      modal.style.display = "block";
      listDiv.textContent = "Loading...";
      try {
        const snap = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .orderBy("timestamp", "desc")
          .get();
        listDiv.innerHTML = "";
        if (snap.empty) {
          listDiv.textContent = "No cloud reports found.";
          return;
        }
        snap.forEach(docSnap => {
          const d = docSnap.data();
          const count = (d.data || []).length;
          const div = document.createElement("div");
          div.style.margin = "8px 0";
          div.innerHTML = `<strong>${d.name || "(no name)"}</strong> (${count} rows)
            <button onclick="loadCloudReport('${docSnap.id}')">Load</button>`;
          listDiv.appendChild(div);
        });
      } catch (e) {
        console.error(e);
        listDiv.textContent = "Error: " + e.message;
      }
    }
    document.getElementById("listBtn").onclick = () => { showCloudLists(); };

    window.loadCloudReport = async (id) => {
      if (!currentUser) return alert("Please login first.");
      if (!confirm("Overwrite current table with this cloud report?")) return;
      try {
        const docSnap = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .doc(id)
          .get();
        if (!docSnap.exists) {
          alert("Report not found.");
          return;
        }
        const d = docSnap.data();
        const recs = d.data || [];
        records = recs.map(o => [
          o.brand, o.ml, o.ob, o.cb, o.sales, o.price, o.sv, o.cbv
        ]);
        saveData();
        renderGroupedTables();
        document.getElementById("listModal").style.display = "none";
      } catch (e) {
        console.error(e);
        alert("Error loading: " + e.message);
      }
    };
