<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ⓜ️GROUPS CLOUD</title>
  <style>
    body { background: aquamarine; font-family: Arial, sans-serif; padding-bottom: 50px; }
    h1 { text-align: center; margin-top: 10px; }

    /* Auth Bar */
    .auth-bar { background: #333; color: white; padding: 10px; text-align: center; margin-bottom: 10px; border-radius: 5px; }
    .auth-bar button { margin-left: 10px; padding: 5px 10px; cursor: pointer; }

    form {
      background: rgb(191, 183, 187);
      text-align: center;
      padding: 15px 18px;
      margin: 10px auto;
      width: fit-content;
      border-radius: 10px;
    }
    table { background: antiquewhite; margin: 12px auto; border-collapse: collapse; width: 95%; max-width: 1100px; }
    th, td { border: 1px solid #333; padding: 6px 10px; }
    th { background: #f1e2c6; }
    .groupTitle { text-align: center; margin: 18px 0 6px; }
    .totalsTable { width: 95%; max-width: 1100px; margin: 0 auto 18px; background: yellow; font-weight: bold; }

    .btn-blue { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
    .btn-orange { background: #fd7e14; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
    .btn-purple { background: #6f42c1; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }

    #qwe { background: red; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }
    #muhil { background: green; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }

    input, select { padding: 6px; }

    /* Modal for Cloud List */
    #listModal {
      display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.7);
    }
    .modal-content {
      background-color: white; margin: 10% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 600px;
    }

    @media print {
      form, .auth-bar, #listModal, #eraseBox, button { display: none !important; }
      body { background: white !important; }
    }
  </style>
</head>

<body>

  <!-- GOOGLE LOGIN (Firebase Auth) -->
  <div class="auth-bar">
    <span id="userStatus">Not Logged In</span>
    <button id="loginBtn">Google Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </div>

  <h1>SHOP NO:2605</h1>

  <!-- MAIN FORM -->
  <form id="information">
    <label for="brand">Brand name</label>
    <input type="text" id="brand" placeholder="Type brand name..." autocomplete="off" />
    <datalist id="suggestions"></datalist>

    <br><br>

    <label for="ml">ML</label>
    <select id="ml" name="ml">
      <option value="">select</option>
      <option value="180">180 ml</option>
      <option value="325">325 ml</option>
      <option value="375">375 ml</option>
      <option value="500">500 ml</option>
      <option value="650">650 ml</option>
      <option value="750">750 ml</option>
      <option value="1000">1000 ml</option>
    </select>

    <br><br>
    <label for="ob">Opening</label> <input type="number" id="ob" />
    <label for="cb">Closing</label> <input type="number" id="cb" />
    <br><br>
    <label for="price">Price</label> <input type="number" id="price" />

    <br><br>
    <input type="submit" value="Submit Row" class="btn-blue" />
    <input type="reset" value="Clear Form" />

    <hr>
    <h3>Cloud & Tools</h3>
    <!-- NEXT DAY: OB = old CB, CB = 0 -->
    <button type="button" class="btn-orange" id="nextDayBtn">☀️ NEXT DAY (CB → OB)</button>
    <!-- STORE TO CLOUD: save all records for this user -->
    <button type="button" class="btn-blue" id="storeCloudBtn">☁️ STORE TO CLOUD</button>
    <!-- LIST BUTTON: show all stored reports and load one -->
    <button type="button" class="btn-purple" id="listBtn">📂 LIST BUTTON</button>

    <hr>
    <button type="button" id="muhil">EDIT ROW</button>
    <button type="button" id="editAllBtn">Edit All</button>
    <button type="button" id="saveAllBtn" style="display:none;">Save All</button>
    <button type="button" id="qwe" onclick="clearAll()">Clear Table</button>
    <button type="button" id="printBtn" onclick="window.print()">Print PDF</button>
  </form>

  <div id="groups"></div>

  <!-- Cloud list modal -->
  <div id="listModal">
    <div class="modal-content">
      <h2>Cloud Saved Records</h2>
      <div id="cloudDataList">Loading...</div>
      <br>
      <button onclick="document.getElementById('listModal').style.display='none'">Close</button>
    </div>
  </div>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // --- STEP 1: CONFIGURATION (FILL THESE) ---  [web:126]
const firebaseConfig = {
  apiKey: "AIzaSyCYBSq_NTLy0lqcL1bXd3iGtjr16fZEvBA",
  authDomain: "store-45bb2.firebaseapp.com",
  projectId: "store-45bb2",
  storageBucket: "store-45bb2.firebasestorage.app",
  messagingSenderId: "385087942859",
  appId: "1:385087942859:web:47de5f5375550a26bb6b4e",
  measurementId: "G-V7PY6W7VND"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    let records = JSON.parse(localStorage.getItem("calcrecords")) || [];

    // --- STEP 2: AUTH LOGIC (Google login) ---  [web:69][web:123]
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById("userStatus").innerText = "User: " + user.email;
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "inline";
      } else {
        currentUser = null;
        document.getElementById("userStatus").innerText = "Not Logged In";
        document.getElementById("loginBtn").style.display = "inline";
        document.getElementById("logoutBtn").style.display = "none";
      }
    });

    document.getElementById("loginBtn").onclick  = () => auth.signInWithPopup(provider);
    document.getElementById("logoutBtn").onclick = () => auth.signOut();

    // ---------- PRICE LIST (short; add full list as you need) ----------
    const PRICELIST = [
      { brand: "Old king xxxx rum", ml: 180, price: 140 },
      { brand: "Old king xxxx rum", ml: 375, price: 280 },
      { brand: "Old king xxxx rum", ml: 750, price: 560 },
      // add your full list here...
    ];

    const BRANDS = [...new Set(PRICELIST.map(x => x.brand))].sort();

    // ---------- GROUPS ----------
    const GROUPS = [
      { key: "180_140", title: "Table 1: 180 ml (Price <= 140)", filter: r => r[1] === 180 && r[5] <= 140 },
      { key: "180_170", title: "Table 2: 180 ml (Price = 170)", filter: r => r[1] === 180 && r[5] === 170 },
      { key: "180_gt200", title: "Table 3: 180 ml (Price >= 200)", filter: r => r[1] === 180 && r[5] >= 200 },
      { key: "375", title: "Table 4: 375 ml", filter: r => r[1] === 375 },
      { key: "750", title: "Table 5: 750 ml", filter: r => r[1] === 750 },
      { key: "1000", title: "Table 6: 1000 ml", filter: r => r[1] === 1000 },
      { key: "650", title: "Table 7: 650 ml", filter: r => r[1] === 650 },
      { key: "500", title: "Table 8: 500 ml", filter: r => r[1] === 500 },
    ];

    // ---------- Helpers ----------
    function money(n) { return (Number(n) || 0).toFixed(2); }

    function saveAndRender() {
      localStorage.setItem("calcrecords", JSON.stringify(records));
      renderGroupedTables();
    }

    function renderBrandOptions(filterText) {
      const datalist = document.getElementById("suggestions");
      datalist.innerHTML = "";
      const q = (filterText || "").toLowerCase();
      BRANDS
        .filter(b => b.toLowerCase().includes(q))
        .slice(0, 30)
        .forEach(b => {
          const opt = document.createElement("option");
          opt.value = b;
          datalist.appendChild(opt);
        });
    }

    function autoApplyPrice() {
      const brand = document.getElementById("brand").value.trim();
      const ml = Number(document.getElementById("ml").value || 0);
      if (!brand || !ml) return;
      const match = PRICELIST.find(x => x.brand === brand && x.ml === ml);
      document.getElementById("price").value = match ? match.price : "";
    }

    // ---------- Render tables ----------
    function renderGroupedTables() {
      const host = document.getElementById("groups");
      host.innerHTML = "";

      let t9OB = 0, t9CB = 0, t9Sales = 0, t9SV = 0, t9CBV = 0;
      let t10OB = 0, t10CB = 0, t10Sales = 0, t10SV = 0, t10CBV = 0;

      GROUPS.forEach((g, idx) => {
        const rows = records.filter(g.filter).slice().sort((a, b) => a[5] - b[5]);

        const totalOB  = rows.reduce((a,r) => a + (r[2] || 0), 0);
        const totalCB  = rows.reduce((a,r) => a + (r[3] || 0), 0);
        const totalS   = rows.reduce((a,r) => a + (r[4] || 0), 0);
        const totalSV  = rows.reduce((a,r) => a + (r[6] || 0), 0);
        const totalCBV = rows.reduce((a,r) => a + (r[7] || 0), 0);

        if (idx <= 5) {
          t9OB  += totalOB;  t9CB  += totalCB;  t9Sales += totalS;  t9SV += totalSV;  t9CBV += totalCBV;
        } else {
          t10OB += totalOB; t10CB += totalCB; t10Sales += totalS; t10SV += totalSV; t10CBV += totalCBV;
        }

        const h2 = document.createElement("h2");
        h2.className = "groupTitle";
        h2.innerText = g.title;
        host.appendChild(h2);

        let html = `<table><thead><tr>
          <th>S.No</th><th>Brand</th><th>ML</th><th>OB</th><th>CB</th>
          <th>Sales</th><th>Price</th><th>Sales Value</th><th>CB Value</th>
        </tr></thead><tbody>`;

        if (rows.length === 0) {
          html += `<tr><td colspan="9" style="text-align:center">No Data</td></tr>`;
        } else {
          rows.forEach((r,i) => {
            html += `<tr>
              <td>${i+1}</td>
              <td>${r[0]}</td>
              <td>${r[1]}</td>
              <td>${r[2]}</td>
              <td>${r[3]}</td>
              <td>${r[4]}</td>
              <td>${r[5]}</td>
              <td>${money(r[6])}</td>
              <td>${money(r[7])}</td>
            </tr>`;
          });
        }
        html += `</tbody></table>`;
        host.insertAdjacentHTML("beforeend", html);

        const totals = document.createElement("table");
        totals.className = "totalsTable";
        totals.innerHTML = `
          <tr>
            <td>Total OB BOT: ${money(totalOB)}</td>
            <td>Total CB BOT: ${money(totalCB)}</td>
            <td>Total Sales BOT: ${money(totalS)}</td>
            <td>Total Sales Value: ${money(totalSV)}</td>
            <td>Total CB Value: ${money(totalCBV)}</td>
          </tr>`;
        host.appendChild(totals);
      });

      // IMSF and BEER + total could be added here similarly if you want
    }

    // ---------- FORM SUBMIT ----------
    document.getElementById("information").onsubmit = function(e) {
      e.preventDefault();
      const brand = document.getElementById("brand").value.trim();
      const ml    = Number(document.getElementById("ml").value || 0);
      const ob    = Number(document.getElementById("ob").value || 0);
      const cb    = Number(document.getElementById("cb").value || 0);
      const price = Number(document.getElementById("price").value || 0);
      if (!brand || !ml || !price) {
        alert("Brand, ML, and Price are required.");
        return;
      }
      const sales = ob - cb;
      records.push([brand, ml, ob, cb, sales, price, price * sales, price * cb]);
      saveAndRender();
      this.reset();
    };

    // ---------- NEXT DAY: OB = old CB, CB = 0 ----------
    document.getElementById("nextDayBtn").onclick = function () {
      if (records.length === 0) return alert("Table is empty.");
      if (!confirm("Next Day? OB = previous CB, CB reset to 0, sales recalculated.")) return;

      records = records.map(r => {
        const brand = r[0];
        const ml    = r[1];
        const oldCB = r[3] || 0;
        const price = r[5] || 0;

        const newOB = oldCB;    // OB = old CB
        const newCB = 0;        // CB reset to 0
        const sales = newOB - newCB;
        const sv    = price * sales;
        const cbv   = price * newCB;

        return [brand, ml, newOB, newCB, sales, price, sv, cbv];
      });

      saveAndRender();
      alert("Next day applied.");
    };

    // ---------- STORE TO CLOUD ----------
    async function saveToCloud() {
      if (!currentUser) return alert("Please Login first!");
      if (records.length === 0) return alert("No data to save.");

      const listName = prompt("Enter name for this report (e.g. date):", new Date().toLocaleDateString());
      if (!listName) return;

      // convert inner arrays to objects to avoid nested-array issues [web:113]
      const dataForFirestore = records.map(r => ({
        brand: r[0],
        ml: r[1],
        ob: r[2],
        cb: r[3],
        sales: r[4],
        price: r[5],
        sv: r[6],
        cbv: r[7]
      }));

      try {
        await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .add({
            name: listName,
            data: dataForFirestore,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        alert("Saved to Cloud successfully!");
      } catch (e) {
        console.error(e);
        alert("Error saving: " + e.message);
      }
    }

    document.getElementById("storeCloudBtn").onclick = () => {
      saveToCloud();
    };

    // ---------- LIST BUTTON: show & load cloud reports ----------
    async function showCloudList() {
      if (!currentUser) return alert("Please Login first!");
      document.getElementById("listModal").style.display = "block";
      const listDiv = document.getElementById("cloudDataList");
      listDiv.innerHTML = "Fetching...";

      try {
        const snapshot = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .orderBy("timestamp", "desc")
          .get();

        listDiv.innerHTML = "";
        if (snapshot.empty) {
          listDiv.innerHTML = "No cloud records found.";
          return;
        }

        snapshot.forEach(docSnap => {
          const d = docSnap.data();
          const div = document.createElement("div");
          div.style.margin = "10px 0";
          const count = (d.data || []).length;
          div.innerHTML = `<strong>${d.name}</strong> (${count} items)
            <button onclick="loadCloudRecord('${docSnap.id}')">Load</button>`;
          listDiv.appendChild(div);
        });
      } catch (e) {
        console.error(e);
        listDiv.innerHTML = "Error loading list: " + e.message;
      }
    }

    document.getElementById("listBtn").onclick = () => showCloudList();

    window.loadCloudRecord = async (id) => {
      if (!currentUser) return alert("Please Login first!");
      if (!confirm("Overwrite local table with this cloud data?")) return;

      try {
        const docSnap = await db.collection("users")
          .doc(currentUser.uid)
          .collection("reports")
          .doc(id)
          .get();

        if (!docSnap.exists) {
          alert("Report not found.");
          return;
        }

        const d = docSnap.data();
        const recs = d.data || [];

        // convert back to arrays
        records = recs.map(o => [
          o.brand, o.ml, o.ob, o.cb, o.sales, o.price, o.sv, o.cbv
        ]);

        saveAndRender();
        document.getElementById("listModal").style.display = "none";
      } catch (e) {
        console.error(e);
        alert("Error loading record: " + e.message);
      }
    };

    // ---------- CLEAR ALL ----------
    function clearAll() {
      if (confirm("Clear local table?") && prompt("Type 'yes' to confirm") === "yes") {
        records = [];
        saveAndRender();
      }
    }
    window.clearAll = clearAll;

    // ---------- Brand suggestions + price auto ----------
    document.getElementById("brand").addEventListener("input", e => {
      renderBrandOptions(e.target.value);
      autoApplyPrice();
    });
    document.getElementById("brand").addEventListener("focus", e => {
      renderBrandOptions(e.target.value);
    });
    document.getElementById("ml").addEventListener("change", autoApplyPrice);

    // Initial render
    renderGroupedTables();
  </script>
</body>
</html>
