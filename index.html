<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ⓜ️GROUPS – SHOP NO:2605</title>
  <style>
    body { background: aquamarine; font-family: Arial, sans-serif; }
    h1 { text-align: center; margin-top: 10px; }
    form {
      background: rgb(191, 183, 187);
      text-align: center;
      padding: 15px 18px;
      margin: 10px auto;
      width: fit-content;
      border-radius: 10px;
    }
    table {
      background: antiquewhite;
      margin: 12px auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1100px;
    }
    th, td { border: 1px solid #333; padding: 6px 10px; }
    th { background: #f1e2c6; }
    .groupTitle { text-align: center; margin: 18px 0 6px; }
    .totalsTable {
      width: 95%;
      max-width: 1100px;
      margin: 0 auto 18px;
      background: yellow;
      font-weight: bold;
    }
    #qwe { background: red; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }
    #muhil { background: green; color: #fff; padding: 8px 14px; border: 0; cursor: pointer; }
    input, select { padding: 6px; }
    .editing { background: #ffeeba; }
    #userInfo {
      margin: 5px 10px;
      text-align: right;
      font-weight: bold;
    }
    @media print {
      form,
      #printBtn,
      #muhil,
      #qwe,
      .muhil,
      .qwe,
      #eraseBox,
      #eraseForm,
      #eraseBtn,
      #eraseSubmit,
      #storeCloudBtn,
      #nextDayBtn,
      #listBtn,
      #userInfo {
        display: none !important;
      }
      body { background: white !important; }
      table { width: 100% !important; max-width: 100% !important; }
      .totalsTable { page-break-inside: avoid; }
      h2 { page-break-after: avoid; }
    }
  </style>
</head>

<body>
  <h1>SHOP NO:2605</h1>

  <div id="userInfo">Checking login...</div>

  <form id="information">
    <label for="brand">Brand name</label>
    <input type="text" id="brand" placeholder="Type brand name..." autocomplete="off" />
    <datalist id="suggestions"></datalist>

    <br><br>

    <label for="ml">ML</label>
    <select id="ml" name="ml">
      <option value="">select</option>
      <option value="180">180 ml</option>
      <option value="325">325 ml</option>
      <option value="375">375 ml</option>
      <option value="500">500 ml</option>
      <option value="650">650 ml</option>
      <option value="750">750 ml</option>
      <option value="1000">1000 ml</option>
    </select>

    <br><br>

    <label for="ob">Enter opening balance</label>
    <input type="number" id="ob" name="ob" placeholder="Enter the number" />

    <br><br>

    <label for="cb">Enter closing balance</label>
    <input type="number" id="cb" name="cb" placeholder="Enter the number" />

    <br><br>

    <label for="price">price</label>
    <input type="number" id="price" name="price" placeholder="price" />

    <br><br>

    <input type="reset" value="clear" />
    <input type="submit" value="submit" />

    <br><br><hr><hr>

    <button type="button" id="muhil">EDIT</button>

    <br><br><hr>
    <button type="button" id="editAllBtn">Edit All</button>
    <button type="button" id="saveAllBtn" style="display:none;">Save</button>

    <br><br><hr>
    <button type="button" id="storeCloudBtn">Store to Cloud</button>
    <button type="button" id="nextDayBtn">Next Day</button>
    <button type="button" id="listBtn">Cloud Lists</button>

    <br><br><hr>
    <button type="button" id="qwe" onclick="clearAll()">Clear table</button>
    <br><br><hr>
    <button type="button" id="printBtn" onclick="printReport()">Print / Save PDF</button>
  </form>

  <div id="groups"></div>

  <div id="eraseBox" style="width:95%;max-width:1100px;margin:10px auto;text-align:center;">
    <button type="button" id="eraseBtn" class="qwe">Erase Row</button>
    <div id="eraseForm" style="display:none;margin-top:10px;">
      <input type="number" id="eraseTableNo" min="1" max="8" placeholder="Table no (1-8)">
      <input type="number" id="eraseRowNo" min="1" placeholder="Row no (N)">
      <button type="button" id="eraseSubmit" class="muhil">Submit</button>
    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      getDoc,
      doc,
      setDoc,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // ---------- Parse JWT from query (from login.html) ----------
    function decodeJWT(token) {
      const base64Url = token.split(".")[1];
      const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split("")
          .map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
          .join("")
      );
      return JSON.parse(jsonPayload);
    }

    function getCredentialFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const cred = params.get("cred");
      return cred ? decodeURIComponent(cred) : null;
    }

    let currentUser = null;
    let records = [];
    let currentListId = null;

    (function initLogin() {
      const cred = getCredentialFromQuery();
      const ui = document.getElementById("userInfo");
      if (!cred) {
        ui.textContent = "Not signed in – go to login.html";
        return;
      }
      try {
        const payload = decodeJWT(cred);
        currentUser = {
          uid: payload.sub,
          name: payload.name,
          email: payload.email
        };
        ui.textContent =
          "Signed in as: " + currentUser.name + " (" + currentUser.email + ")";
      } catch (e) {
        console.error(e);
        ui.textContent = "Login info invalid – please login again.";
      }
    })();

    function printReport() {
      renderGroupedTables();
      window.print();
    }
    window.printReport = printReport;

    // ---------- Firebase config ----------
      const firebaseConfig = {
  apiKey: "AIzaSyBqtTwZJfNYF48MK-R4uF60FkuEuGKCEJY",
  authDomain: "shop-987b6.firebaseapp.com",
  projectId: "shop-987b6",
  storageBucket: "shop-987b6.firebasestorage.app",
  messagingSenderId: "1022735148857",
  appId: "1:1022735148857:web:5d6f667191abf18f1eeae8",
  measurementId: "G-NPHYKZ1VM5"
};


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ---------- PRICE LIST, DOM, GROUPS ----------
    // (same as before – shortened here for space, keep your full PRICELIST)

    const PRICELIST = [ /* ... full list from previous code ... */ ];

    const BRANDS = [...new Set(PRICELIST.map(x => x.brand))].sort();

    const form = document.getElementById("information");
    const brandInput = document.getElementById("brand");
    const mlSelect = document.getElementById("ml");
    const priceInput = document.getElementById("price");
    const datalist = document.getElementById("suggestions");
    const editAllBtn = document.getElementById("editAllBtn");
    const saveAllBtn = document.getElementById("saveAllBtn");
    const storeCloudBtn = document.getElementById("storeCloudBtn");
    const nextDayBtn = document.getElementById("nextDayBtn");
    const listBtn = document.getElementById("listBtn");
    const eraseBtn = document.getElementById("eraseBtn");
    const eraseFormDiv = document.getElementById("eraseForm");
    const eraseSubmit = document.getElementById("eraseSubmit");

    brandInput.setAttribute("list", "suggestions");

    function renderBrandOptions(filterText) {
      datalist.innerHTML = "";
      const q = (filterText || "").toLowerCase();
      BRANDS
        .filter(b => b.toLowerCase().includes(q))
        .slice(0, 30)
        .forEach(b => {
          const opt = document.createElement("option");
          opt.value = b;
          datalist.appendChild(opt);
        });
    }

    function autoApplyPrice() {
      const brand = brandInput.value.trim();
      const ml = parseFloat(mlSelect.value || 0);
      if (!brand || !ml) return;
      const match = PRICELIST.find(x => x.brand === brand && x.ml === ml);
      priceInput.value = match ? match.price : "";
    }

    brandInput.addEventListener("input", () => {
      renderBrandOptions(brandInput.value);
      autoApplyPrice();
    });
    brandInput.addEventListener("focus", () => renderBrandOptions(brandInput.value));
    mlSelect.addEventListener("change", autoApplyPrice);

    function money(n) { return (Number(n) || 0).toFixed(2); }
    function sumField(arr, idx) { return arr.reduce((a, r) => a + (Number(r[idx]) || 0), 0); }

    const GROUPS = [
      { key: "180_140",   title: "Table 1: 180 ml (Price <= 140)",  filter: r => r[1] === 180 && r[5] <= 140 },
      { key: "180_170",   title: "Table 2: 180 ml (Price = 170)",  filter: r => r[1] === 180 && r[5] === 170 },
      { key: "180_gt200", title: "Table 3: 180 ml (Price >= 200)",  filter: r => r[1] === 180 && r[5] >= 200 },
      { key: "375",  title: "Table 4: 375 ml",  filter: r => r[1] === 375 },
      { key: "750",  title: "Table 5: 750 ml",  filter: r => r[1] === 750 },
      { key: "1000", title: "Table 6: 1000 ml", filter: r => r[1] === 1000 },
      { key: "650",  title: "Table 7: 650 ml",  filter: r => r[1] === 650 },
      { key: "500",  title: "Table 8: 500 ml",  filter: r => r[1] === 500 },
    ];

    function renderGroupedTables() {
      const host = document.getElementById("groups");
      host.innerHTML = "";

      let t9OB = 0, t9CB = 0, t9Sales = 0, t9SV = 0, t9CBV = 0;
      let t10OB = 0, t10CB = 0, t10Sales = 0, t10SV = 0, t10CBV = 0;

      GROUPS.forEach((g, idx) => {
        const rows = records
          .filter(g.filter)
          .slice()
          .sort((a, b) => Number(a[5]) - Number(b[5]));

        const totalOB = sumField(rows, 2);
        const totalCB = sumField(rows, 3);
        const totalSales = sumField(rows, 4);
        const totalSV = sumField(rows, 6);
        const totalCBV = sumField(rows, 7);

        if (idx >= 0 && idx <= 5) {
          t9OB += totalOB; t9CB += totalCB; t9Sales += totalSales; t9SV += totalSV; t9CBV += totalCBV;
        }
        if (idx >= 6 && idx <= 7) {
          t10OB += totalOB; t10CB += totalCB; t10Sales += totalSales; t10SV += totalSV; t10CBV += totalCBV;
        }

        const title = document.createElement("h2");
        title.className = "groupTitle";
        title.textContent = g.title;
        host.appendChild(title);

        const t = document.createElement("table");
        t.innerHTML = `
          <thead>
            <tr>
              <th>S.No</th><th>Brand</th><th>ML</th><th>OB</th><th>CB</th>
              <th>Sales</th><th>Price</th><th>Sales Value</th><th>CB Value</th>
            </tr>
          </thead>
          <tbody>
            ${
              rows.length === 0
                ? `<tr><td colspan="9" style="text-align:center">No records</td></tr>`
                : rows.map((r, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td>${r[0]}</td>
                    <td>${r[1]}</td>
                    <td>${r[2]}</td>
                    <td>${r[3]}</td>
                    <td>${r[4]}</td>
                    <td>${r[5]}</td>
                    <td>${money(r[6])}</td>
                    <td>${money(r[7])}</td>
                  </tr>
                `).join("")
            }
          </tbody>
        `;
        host.appendChild(t);

        const totals = document.createElement("table");
        totals.className = "totalsTable";
        totals.innerHTML = `
          <tr>
            <td>Total OB BOT: ${money(totalOB)}</td>
            <td>Total CB BOT: ${money(totalCB)}</td>
            <td>Total Sales BOT: ${money(totalSales)}</td>
            <td>Total Sales Value: ${money(totalSV)}</td>
            <td>Total CB Value: ${money(totalCBV)}</td>
          </tr>
        `;
        host.appendChild(totals);
      });

      const t9Title = document.createElement("h2");
      t9Title.className = "groupTitle";
      t9Title.textContent = "(IMSF)";
      host.appendChild(t9Title);

      const t9Totals = document.createElement("table");
      t9Totals.className = "totalsTable";
      t9Totals.innerHTML = `
        <tr>
          <td>Total OB BOT: ${money(t9OB)}</td>
          <td>Total CB BOT: ${money(t9CB)}</td>
          <td>Total Sales BOT: ${money(t9Sales)}</td>
          <td>Total Sales Value: ${money(t9SV)}</td>
          <td>Total CB Value: ${money(t9CBV)}</td>
        </tr>
      `;
      host.appendChild(t9Totals);

      const t10Title = document.createElement("h2");
      t10Title.className = "groupTitle";
      t10Title.textContent = "(BEER)";
      host.appendChild(t10Title);

      const t10Totals = document.createElement("table");
      t10Totals.className = "totalsTable";
      t10Totals.innerHTML = `
        <tr>
          <td>Total OB BOT: ${money(t10OB)}</td>
          <td>Total CB BOT: ${money(t10CB)}</td>
          <td>Total Sales BOT: ${money(t10Sales)}</td>
          <td>Total Sales Value: ${money(t10SV)}</td>
          <td>Total CB Value: ${money(t10CBV)}</td>
        </tr>
      `;
      host.appendChild(t10Totals);

      const totalTitle = document.createElement("h2");
      totalTitle.className = "groupTitle";
      totalTitle.textContent = "Total(IMSF&BEER)";
      host.appendChild(totalTitle);

      const totalTable = document.createElement("table");
      totalTable.className = "totalsTable";

      const totalOB = t9OB + t10OB;
      const totalCB = t9CB + t10CB;
      const totalSales = t9Sales + t10Sales;
      const totalSV = t9SV + t10SV;
      const totalCBV = t9CBV + t10CBV;

      totalTable.innerHTML = `
        <tr>
          <td>Total OB BOT: ${money(totalOB)}</td>
          <td>Total CB BOT: ${money(totalCB)}</td>
          <td>Total Sales BOT: ${money(totalSales)}</td>
          <td>Total Sales Value: ${money(totalSV)}</td>
          <td>Total CB Value: ${money(totalCBV)}</td>
        </tr>
      `;
      host.appendChild(totalTable);
    }

    // --- submit / edit / erase / clear / next day ---
    // (use the same handlers you already had; they operate on `records`)

    // ---------------- STORE TO CLOUD (objects, no nested arrays) ----------------
    async function storeToCloud() {
      if (!currentUser) {
        alert("Please sign in on login.html first.");
        return;
      }
      if (!records || records.length === 0) {
        if (!confirm("No records. Store empty list?")) return;
      }

      const recordsForFirestore = records.map(r => ({
        brand: r[0],
        ml: r[1],
        ob: r[2],
        cb: r[3],
        sales: r[4],
        price: r[5],
        sv: r[6],
        cbv: r[7]
      }));

      const payload = {
        uid: currentUser.uid,
        createdAt: Date.now(),
        records: recordsForFirestore
      };

      if (currentListId) {
        await setDoc(doc(db, "lists", currentListId), payload);
      } else {
        const ref = await addDoc(collection(db, "lists"), payload);
        currentListId = ref.id;
      }

      alert("Data stored to cloud.");
    }

    storeCloudBtn.addEventListener("click", () => {
      storeToCloud().catch(err => {
        console.error(err);
        alert("Error storing to cloud.");
      });
    });

    // ---------------- CLOUD LISTS (load) ----------------
    async function showCloudLists() {
      if (!currentUser) {
        alert("Please sign in on login.html first.");
        return;
      }

      const q = query(collection(db, "lists"), where("uid", "==", currentUser.uid));
      const snap = await getDocs(q);

      const docsArr = [];
      snap.forEach(docSnap => {
        const data = docSnap.data();
        docsArr.push({
          id: docSnap.id,
          createdAt: data.createdAt || 0,
          count: (data.records || []).length
        });
      });

      if (docsArr.length === 0) {
        alert("No cloud lists found.");
        return;
      }

      docsArr.sort((a, b) => a.createdAt - b.createdAt);

      let msg = "Your cloud lists:\n";
      docsArr.forEach((d, i) => {
        const date = new Date(d.createdAt).toLocaleString();
        msg += `${i + 1}) ${date} – ${d.count} rows\n`;
      });
      msg += "\nEnter number to load:";

      const choiceStr = prompt(msg);
      if (choiceStr === null) return;
      const idx = parseInt(choiceStr, 10) - 1;
      if (isNaN(idx) || idx < 0 || idx >= docsArr.length) {
        alert("Invalid choice.");
        return;
      }

      const chosen = docsArr[idx];
      const docSnap = await getDoc(doc(db, "lists", chosen.id));
      if (!docSnap.exists()) {
        alert("List not found.");
        return;
      }

      const data = docSnap.data();
      const recs = data.records || [];

      records = recs.map(o => [
        o.brand,
        o.ml,
        o.ob,
        o.cb,
        o.sales,
        o.price,
        o.sv,
        o.cbv
      ]);

      currentListId = chosen.id;
      renderGroupedTables();
    }

    listBtn.addEventListener("click", () => {
      showCloudLists().catch(err => {
        console.error(err);
        alert("Error loading cloud lists.");
      });
    });

    // ---------------- Initial load ----------------
    renderBrandOptions("");
    renderGroupedTables();
  </script>
</body>
</html>
