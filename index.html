<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shop 2605 - Home</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }
    .wrapper {
      text-align: center;
    }
    .wrapper h1 {
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
    .btn-block {
      text-align: center;
    }
    .img-btn {
      border: none;
      padding: 0;
      background: none;
      cursor: pointer;
    }
    .img-btn img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .img-btn img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,0,0,0.9);
    }
    .label {
      margin-top: 10px;
      font-size: 18px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>SHOP NO: 2605</h1>

    <div class="buttons">
      <!-- Calculator button -->
      <div class="btn-block">
        <button class="img-btn" onclick="location.href='calculator.html'">
          <img src="calculator.jpg" alt="Calculator">
        </button>
        <div class="label">Calculator</div>
      </div>

      <!-- Cloud lists button -->
      <div class="btn-block">
        <button class="img-btn" onclick="location.href='cloud.html'">
          <img src="cloud.png" alt="Cloud Lists">
        </button>
        <div class="label">Cloud Lists</div>
      </div>
    </div>
  </div>
</body>
</html>
